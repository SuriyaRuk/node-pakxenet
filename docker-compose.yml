services:
  full-node:
    image: ghcr.io/tempoxyz/tempo:latest
    container_name: tempo-full-node
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/config
      - ./data:/data
    command: >
      node
      --chain /config/genesis.json
      --datadir /data/full-node
      --trusted-peers enode://51177dde89242d9121d787a681bd2a0bd6013428a6b83e684a253815db96d8b3bd42c409d2f0f0c805fb913f2066f597e0df65451bca3e81ca718afaa0763de3@204.168.179.190:6001
      --port 9001
      --discovery.port 9001
      --discovery.v5.port 9005
      --authrpc.port 9003
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.api all
      --follow ws://204.168.179.190:18546
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

